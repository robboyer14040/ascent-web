# fly.toml — Ascent Web on Fly.io
# Deploy: fly deploy
# First time: fly launch --no-deploy, then fly deploy

app = "ascent-web"
primary_region = "sjc"  # San Jose — closest to Santa Cruz

[build]

[env]
  # Non-secret env vars — secrets set via: fly secrets set KEY=value
  ASCENT_DB_PATH    = "/data/Ascent.ascentdb"
  ASCENT_HTTPS      = "true"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database and Strava tokens
[[mounts]]
  source      = "ascent_data"
  destination = "/data"
  initial_size = "3gb"

[checks]
  [checks.alive]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/favicon.ico"
    port         = 8000
    timeout      = "5s"
    type         = "http"
