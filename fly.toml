# fly.toml app configuration file generated for ascent-web on 2026-03-25T15:13:39-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ascent-web'
primary_region = 'sjc'

[build]

[env]
  ASCENT_DB_PATH = '/data/Ascent.ascentdb'
  ASCENT_HTTPS = 'true'

[[mounts]]
  source = 'ascent_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.alive]
    port = 8000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/favicon.ico'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
