<div id="root">
  <div id="top-row">
  <div id="sidebar">
    <div id="filter-bar">
      <select id="typeFilter"><option value="">All types</option></select>
      <select id="yearFilter"><option value="">All years</option></select>
      <span id="viewing-user-badge" onclick="openUserPicker()" title="Switch user" style="display:none;font-size:11px;font-weight:500;color:#f97316;cursor:pointer;padding:2px 7px;border:1px solid #f97316;border-radius:10px;opacity:.85;user-select:none;flex-shrink:0"></span>
      <div class="tb-search">
        <span class="tb-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search…">
      </div>
      <span class="tb-count" id="actCount"></span>
      <button class="tb-btn" id="bulk-gpx-btn" onclick="downloadSelectedGPX()" title="Download selected activities as GPX files" style="display:none">↓ GPX (<span id="bulk-gpx-count">0</span>)</button>
      <button class="tb-btn" onclick="openImportModal()" title="Import GPX or FIT files">↑ Import</button>
      <button class="tb-btn" id="col-gear-btn" onclick="toggleColPicker(event)" title="Choose columns" style="padding:3px 7px;font-size:20px;line-height:1">⚙</button>
      <div id="col-picker"></div>
    </div>

    <!-- Selection mode bar (touch multi-select) -->
    <div id="select-mode-bar" style="display:none;align-items:center;justify-content:space-between;padding:5px 10px;background:#f97316;gap:8px">
      <span id="select-mode-count" style="color:#fff;font-size:13px;font-weight:600"></span>
      <button onclick="exitSelectMode()" style="background:rgba(0,0,0,.25);border:none;color:#fff;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer">Done</button>
    </div>

    <div id="list-scroll">
    <div id="col-head"></div>

    <div id="act-list">
      <div id="list-spacer"></div>
      <div id="list-rows"></div>
    </div>
    </div>

    <!-- Custom always-visible scrollbars -->
    <div id="hscroll-track"><div id="hscroll-thumb"></div></div>
    <div id="vscroll-track"><div id="vscroll-thumb"></div></div>

  </div>

  <div id="resize-handle"></div>

  <div id="detail">
    <div id="map-wrap">
      <div id="map">
        <div class="map-placeholder" id="mapPlaceholder">Select an activity to view its map</div>
      </div>
      <div class="map-badge" id="mapBadge" style="display:none"></div>
      <div id="map-style-bar" style="position:absolute;top:8px;right:8px;z-index:500;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <button class="map-style-btn active" data-style="osm"         onclick="setMapStyle('osm')">Street</button>
        <button class="map-style-btn"        data-style="topo"        onclick="setMapStyle('topo')">Topo</button>
        <button class="map-style-btn"        data-style="carto-dark"  onclick="setMapStyle('carto-dark')">Dark</button>
        <button class="map-style-btn"        data-style="carto-light" onclick="setMapStyle('carto-light')">Light</button>
        <button class="map-style-btn"        data-style="esri-sat"    onclick="setMapStyle('esri-sat')">Satellite</button>
      </div>
    </div>
  </div>
  </div><!-- #top-row -->
  <div id="info-panel">
      <div id="stats-titlebar">
        <span id="stats-title-label">Info</span>
        <button id="stats-disclose" onclick="toggleStats()" title="Collapse/expand stats"><span class="arr">▾</span></button>
      </div>
      <div class="stats-content">
      <div id="info-left">
        <div id="no-selection"><span class="placeholder-icon">🏔</span><span>Select an activity</span></div>
        <div id="act-detail" style="display:none"></div>
      </div>
      <div id="photo-drag-handle" class="drag-handle drag-handle-v"></div>
      <div id="info-right">
        <div id="photo-panel" style="width:100%;height:100%;position:relative;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="photoClick()">
          <div id="photo-placeholder" style="color:#636366;font-size:12px">No photo</div>
          <img id="photo-img" alt="" style="display:none;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain">
          <video id="photo-vid" muted loop playsinline style="display:none;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain"></video>
          <div id="photo-nav" style="display:none;position:absolute;top:0;left:0;right:0;align-items:center;justify-content:space-between;padding:4px 6px;background:rgba(0,0,0,.55)">
            <button onclick="event.stopPropagation();photoNav(-1)" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px">‹</button>
            <span id="photo-count" style="color:#fff;font-size:11px"></span>
            <button onclick="event.stopPropagation();photoNav(1)" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px">›</button>
          </div>
          <button id="photo-dl-btn" onclick="event.stopPropagation();downloadCurrentMedia()" style="display:none;position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.55);border:none;color:#fff;border-radius:4px;padding:4px 6px;cursor:pointer;line-height:1" title="Download"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
      </div>
      </div><!-- .stats-content -->


      <!-- Lightbox -->
      <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column" onclick="closeLightbox()">
        <img id="lb-img" alt="" style="max-width:90vw;max-height:85vh;object-fit:contain;border-radius:6px">
        <video id="lb-vid" controls playsinline style="display:none;max-width:90vw;max-height:85vh;border-radius:6px;background:#000" onclick="event.stopPropagation()"></video>
        <div style="display:flex;align-items:center;gap:1rem;margin-top:12px">
          <button onclick="event.stopPropagation();photoNav(-1,true)" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:6px 18px;cursor:pointer;font-size:18px">‹</button>
          <span id="lb-count" style="color:#aaa;font-size:13px"></span>
          <button onclick="event.stopPropagation();photoNav(1,true)" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:6px 18px;cursor:pointer;font-size:18px">›</button>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;margin-top:8px">
          <button onclick="event.stopPropagation();downloadCurrentMedia()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:5px 18px;cursor:pointer;font-size:13px">Download</button>
        </div>
        <div style="color:#666;font-size:11px;margin-top:6px">Press Esc or click background to close · ← → to navigate</div>
      </div>
  </div>
  <div id="chart-wrap">
      <div id="analysis-titlebar">
        <span id="analysis-title-label">Analysis</span>
        <button class="sp-tb-btn" onclick="elevZoomStep(-1)" title="Zoom out" style="font-size:13px;padding:1px 6px;line-height:1.4;pointer-events:all">−</button>
        <button class="sp-tb-btn" onclick="elevZoomStep(1)" title="Zoom in" style="font-size:13px;padding:1px 6px;line-height:1.4;pointer-events:all">+</button>
        <button class="sp-tb-btn" onclick="toggleChartSettings(event)" title="Chart overlays" style="font-size:20px;padding:2px 6px;line-height:1;user-select:none;-webkit-user-select:none;touch-action:manipulation;pointer-events:all">⚙</button>
        <button id="analysis-disclose" onclick="toggleAnalysis()" title="Collapse/expand analysis"><span class="arr">▾</span></button>
      </div>
      <div id="chart-toolbar">
        <button class="zones-btn" onclick="openZones()" style="margin-top:2px">Zones…</button>
        <button class="zones-btn" id="compare-btn" onclick="openCompare()" style="margin-top:2px">Compare…</button>
      </div>
      <div id="chart-settings" style="display:none;position:absolute;top:28px;right:4px;z-index:20;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;box-shadow:0 4px 16px rgba(0,0,0,.5)">
        <div style="display:flex;gap:14px;align-items:flex-start">
          <!-- Overlay column -->
          <div style="min-width:120px">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">Overlay</div>
            <select id="overlay1-sel" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:3px 6px;font-size:12px;margin-bottom:4px" onchange="redrawElevWithOverlays()">
              <option value="">None</option>
              <option value="hr">Heart Rate</option>
              <option value="speed">Speed</option>
              <option value="power">Power</option>
              <option value="cadence">Cadence</option>
            </select>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer">
              <input type="checkbox" id="overlay1-zones" onchange="redrawElevWithOverlays()" style="accent-color:#f97316"> Color-code Zones
            </label>
          </div>
          <!-- Splits column -->
          <div style="min-width:150px">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">Splits</div>
            <select id="split-metric-sel" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:3px 6px;font-size:12px;margin-bottom:4px" onchange="onSplitMetricChange()">
              <option value="">None</option>
              <option value="speed">Speed</option>
              <option value="power">Power</option>
              <option value="hr">Heart Rate</option>
              <option value="climb">Climb</option>
              <option value="pace">Pace</option>
              <option value="cadence">Cadence</option>
            </select>
            <div id="split-detail-controls" style="display:none;margin-bottom:4px">
              <div style="display:flex;gap:6px">
                <div style="flex:1">
                  <div style="font-size:9px;color:var(--muted);margin-bottom:2px">Interval</div>
                  <select id="split-len-sel" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:2px 4px;font-size:11px" onchange="redrawElevWithOverlays()">
                    <optgroup label="Time">
                      <option value="t:1">1 sec</option>
                      <option value="t:3">3 sec</option>
                      <option value="t:5">5 sec</option>
                      <option value="t:10">10 sec</option>
                      <option value="t:30">30 sec</option>
                      <option value="t:60">1 min</option>
                    </optgroup>
                    <optgroup label="Distance">
                      <option value="0.1">1/10 mi</option>
                      <option value="0.25">¼ mi</option>
                      <option value="0.5">½ mi</option>
                      <option value="1" selected>1 mi</option>
                      <option value="2">2 mi</option>
                      <option value="5">5 mi</option>
                      <option value="10">10 mi</option>
                    </optgroup>
                  </select>
                </div>
                <div style="flex:1">
                  <div style="font-size:9px;color:var(--muted);margin-bottom:2px">Aggregation</div>
                  <select id="split-agg-sel" style="width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:2px 4px;font-size:11px" onchange="redrawElevWithOverlays()">
                    <option value="avg">Average</option>
                    <option value="max">Maximum</option>
                  </select>
                </div>
              </div>
            </div>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer">
              <input type="checkbox" id="split-zones" onchange="redrawElevWithOverlays()" style="accent-color:#f97316"> Color-code Zones
            </label>
          </div>
          <!-- Peaks column -->
          <div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">Peaks</div>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer">
              <input type="checkbox" id="show-peaks" checked onchange="redrawElevWithOverlays()" style="accent-color:#f97316"> Show
            </label>
          </div>
          <!-- X-Axis column -->
          <div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">X-Axis</div>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer">
              <input type="checkbox" id="xaxis-time" onchange="redrawElevWithOverlays()" style="accent-color:#f97316"> Time
            </label>
          </div>
        </div>
      </div>
      <div id="elev-canvas-area">
        <canvas id="elevChart"></canvas>
        <div id="elev-anim-dot"></div>
        <div id="elev-crosshair"></div>
        <div id="elev-sel-rect"></div>
        <div id="elev-hover-panel"></div>
      </div>
      <div id="elev-zoom-bar">
        <button class="elev-zoom-btn" onclick="elevZoomReset()" title="Reset zoom">⟲</button>
        <input type="range" id="elev-zoom-scroll" min="0" max="1000" value="0"
               oninput="elevScrollTo(this.value)" title="Scroll">
        <span id="elev-zoom-label">2×</span>
        <button class="elev-zoom-btn" onclick="elevZoomStep(-1)">−</button>
        <button class="elev-zoom-btn" onclick="elevZoomStep(1)">+</button>
      </div>
  </div>
  <div id="transport-bar">
  <div class="tb-transport">
    <button class="t-btn" id="t-start" onclick="animJump(0)"       title="Go to start"><svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><rect x="1" y="1" width="2" height="12"/><polygon points="13,1 5,7 13,13"/></svg></button>
    <button class="t-btn" id="t-rev"   onclick="animSetSpeed(-1)"  title="Reverse"><svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><polygon points="12,1 4,7 12,13"/></svg></button>
    <button class="t-btn" id="t-stop"  onclick="animStop()"        title="Stop"><svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><rect x="2" y="2" width="10" height="10"/></svg></button>
    <button class="t-btn" id="t-play"  onclick="animPlay()"        title="Play"><svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><polygon points="2,1 12,7 2,13"/></svg></button>
    <button class="t-btn" id="t-end"   onclick="animJump(1)"       title="Go to end"><svg viewBox="0 0 14 14" width="14" height="14" fill="currentColor"><polygon points="1,1 9,7 1,13"/><rect x="11" y="1" width="2" height="12"/></svg></button>
  </div>
  <span id="t-time">0:00:00</span>
  <input type="range" id="t-scrub" min="0" max="1000" value="0"
         oninput="animScrub(this.value)" onchange="animScrub(this.value)">
  <select id="t-speed" onchange="animSetSpeedVal(this.value)" title="Playback speed">
    <option value="0.25">¼×</option>
    <option value="0.5">½×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
    <option value="4">4×</option>
    <option value="8">8×</option>
  </select>
  <div id="anim-stats">
    <div class="anim-stat"><div class="anim-stat-val" id="as-hr">—</div><div class="anim-stat-lbl" id="as-hr-lbl">HR bpm</div></div>
    <div class="anim-stat"><div class="anim-stat-val" id="as-spd">—</div><div class="anim-stat-lbl" id="as-spd-lbl">mph</div></div>
    <div class="anim-stat"><div class="anim-stat-val" id="as-pwr">—</div><div class="anim-stat-lbl" id="as-pwr-lbl">watts</div></div>
    <div class="anim-stat"><div class="anim-stat-val" id="as-alt">—</div><div class="anim-stat-lbl" id="as-alt-lbl">ft</div></div>
    <div class="anim-stat"><div class="anim-stat-val" id="as-dst">—</div><div class="anim-stat-lbl" id="as-dst-lbl">mi</div></div>
  </div>
</div>
<!-- #mob-detail-screen lives inside #root so it can be a flex sibling of #top-row in landscape -->
<div id="mob-detail-screen">
  <div id="mob-tab-map"      class="mob-tab-panel active"></div>
  <div id="mob-tab-info"     class="mob-tab-panel"></div>
  <div id="mob-tab-analysis" class="mob-tab-panel"></div>
  <div id="mob-tab-photos"   class="mob-tab-panel"></div>
  <div id="mob-detail-tabbar">
    <button class="mob-tab-btn active" data-tab="map"      onclick="mobSwitchTab('map')">      <span class="mob-tab-icon">🗺</span><span>Map</span></button>
    <button class="mob-tab-btn"        data-tab="info"     onclick="mobSwitchTab('info')">     <span class="mob-tab-icon">ℹ️</span><span>Info</span></button>
    <button class="mob-tab-btn"        data-tab="analysis" onclick="mobSwitchTab('analysis')"> <span class="mob-tab-icon">📊</span><span>Analysis</span></button>
    <button class="mob-tab-btn"        data-tab="photos"   onclick="mobSwitchTab('photos')">   <span class="mob-tab-icon">📷</span><span>Photos</span></button>
  </div>
</div>
</div>
