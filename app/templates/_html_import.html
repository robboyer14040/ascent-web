<!-- ── IMPORT MODAL ─────────────────────────────────────────────────────── -->
<div id="import-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px 28px;width:380px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.6)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="font-size:15px;font-weight:600;color:var(--text)">Import Activity</span>
      <button onclick="closeImportModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0">×</button>
    </div>
    <div id="import-drop-zone"
         style="border:2px dashed var(--border2);border-radius:8px;padding:32px 16px;text-align:center;cursor:pointer;transition:border-color .15s"
         onclick="document.getElementById('import-file-input').click()"
         ondragover="event.preventDefault();this.style.borderColor='#f97316'"
         ondragleave="this.style.borderColor=''"
         ondrop="handleImportDrop(event)">
      <div style="font-size:28px;margin-bottom:8px">↑</div>
      <div style="font-size:13px;color:var(--text);margin-bottom:4px">Drop GPX or FIT files here</div>
      <div style="font-size:11px;color:var(--muted)">or click to browse — multiple files supported</div>
    </div>
    <input type="file" id="import-file-input" accept=".gpx,.fit" multiple style="display:none" onchange="handleImportFiles(this.files)">
    <div id="import-status" style="margin-top:14px;font-size:12px;color:var(--muted);min-height:18px;text-align:center"></div>
  </div>
</div>
